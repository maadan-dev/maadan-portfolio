<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Inter:wght@300;400;550&family=Geist+Mono:wght@400&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #030303;
      font-family: 'Inter', sans-serif;
      padding: 30px;
    }

    .frame {
      width: 1140px;
      height: 570px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 28px;
      background: #050506;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 70px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.8);
    }

    /* Modern Mesh Glow Background */
    .glow-cyan {
      position: absolute;
      bottom: -150px;
      left: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }

    .glow-indigo {
      position: absolute;
      top: -150px;
      right: -50px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }

    /* Subtle grid pattern */
    .frame::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
    }

    /* Top Left Label */
    .logo-container {
      position: absolute;
      top: 48px;
      left: 70px;
      z-index: 2;
    }

    .logo {
      height: 24px;
      width: auto;
      opacity: 0.85;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 1;
      max-width: 600px;
      margin-top: 30px;
    }

    .label {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 5px;
      color: #60a5fa;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
    }

    .label::before {
      content: '';
      width: 24px;
      height: 1px;
      background: #60a5fa;
      opacity: 0.7;
    }

    .name {
      font-family: 'Outfit', sans-serif;
      font-size: 78px;
      font-weight: 800;
      color: #ffffff;
      line-height: 0.95;
      letter-spacing: -3px;
    }

    .role {
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 300;
      color: #a1a1aa;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .stack {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .stack span {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      padding: 6px 14px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 100px;
      color: rgba(250, 250, 250, 0.6);
      background: rgba(255, 255, 255, 0.02);
    }

    .right {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-container {
      position: relative;
      width: 280px;
      height: 280px;
    }

    .photo-ring {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 2px solid rgba(96, 165, 250, 0.15);
    }

    .photo-ring-inner {
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 1px solid rgba(96, 165, 250, 0.06);
    }

    .photo {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      filter: grayscale(10%) contrast(105%);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .dot {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #60a5fa;
      border-radius: 50%;
      top: 15px;
      right: 25px;
      box-shadow: 0 0 12px #60a5fa;
    }

    /* Bottom URL */
    .url {
      position: absolute;
      bottom: 40px;
      left: 70px;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: rgba(250, 250, 250, 0.25);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="glow-cyan"></div>
    <div class="glow-indigo"></div>
    
    <div class="logo-container">
      <img class="logo" src="file:///C:/Users/user/Documents/GitHub/My%20Portfolio/maadan-portfolio/public/logo_horizontal.png" alt="Logo">
    </div>
    
    <div class="left">
      <div class="label">Software Developer</div>
      <div class="name">Abdulyekeen<br>Maadan</div>
      <div class="role">Building real products for real clients.</div>
      <div class="stack">
        <span>Next.js</span>
        <span>React</span>
        <span>TypeScript</span>
        <span>Go</span>
      </div>
    </div>
    
    <div class="right">
      <div class="photo-container">
        <div class="photo-ring"></div>
        <div class="photo-ring-inner"></div>
        <img class="photo" src="../public/images/profile.webp" alt="Abdulyekeen Maadan">
        <div class="dot"></div>
      </div>
    </div>
    
    <div class="url">maadan.dev</div>
  </div>
</body>
</html>
