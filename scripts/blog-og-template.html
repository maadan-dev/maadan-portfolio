<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Inter:wght@300;400;550&family=Geist+Mono:wght@400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #030303;
      font-family: 'Inter', sans-serif;
      padding: 30px;
    }

    .frame {
      width: 1140px;
      height: 570px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 28px;
      background: #050506;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 80px 100px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.8);
    }

    /* Modern Mesh Glow Background */
    .glow-cyan {
      position: absolute;
      bottom: -180px;
      left: -120px;
      width: 550px;
      height: 550px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.09) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }

    .glow-indigo {
      position: absolute;
      top: -180px;
      right: -80px;
      width: 650px;
      height: 650px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.09) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }

    /* Subtle grid pattern */
    .frame::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
    }

    /* Logo styling */
    .logo-container {
      position: absolute;
      top: 48px;
      left: 100px;
      z-index: 2;
    }

    .logo {
      height: 24px;
      width: auto;
      opacity: 0.85;
    }

    .content {
      z-index: 1;
      max-width: 100%;
      margin-top: 20px;
    }

    .category {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 5px;
      color: #60a5fa;
      margin-bottom: 20px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .category::before {
      content: '';
      width: 16px;
      height: 1px;
      background: #60a5fa;
      opacity: 0.7;
    }

    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 52px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.05;
      margin-bottom: 20px;
      max-width: 920px;
      letter-spacing: -2px;
    }

    .subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 300;
      color: #a1a1aa;
      line-height: 1.45;
      max-width: 820px;
      margin-bottom: 28px;
    }

    .meta {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .meta span {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: rgba(250, 250, 250, 0.4);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Bottom URL */
    .url {
      position: absolute;
      bottom: 40px;
      left: 100px;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: rgba(250, 250, 250, 0.25);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="glow-cyan"></div>
    <div class="glow-indigo"></div>
    
    <div class="logo-container">
      <img class="logo" src="file:///C:/Users/user/Documents/GitHub/My%20Portfolio/maadan-portfolio/public/logo_horizontal.png" alt="Logo">
    </div>
    
    <div class="content">
      <div class="category" id="category">CATEGORY</div>
      <div class="title" id="title">Blog Post Title</div>
      <div class="subtitle" id="subtitle">Blog post subtitle goes here</div>
      <div class="meta">
        <span id="date">DATE</span>
        <span id="readTime">READ TIME</span>
      </div>
    </div>
    
    <div class="url">maadan.dev/blog/slug</div>
  </div>
</body>
</html>
